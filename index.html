<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO Meta Tags -->
    <title>Southeast Cars & Commercials | Premium Used Cars for Sale</title>
    <meta name="description" content="Southeast Cars & Commercials - Browse our curated collection of premium used cars and commercial vehicles. Quality vehicles, certified inspections, and flexible financing options available." />
    <meta name="keywords" content="used cars for sale, premium cars, commercial vehicles, car dealership, certified used cars, car showroom, buy cars, Southeast Cars, vehicle financing, quality used vehicles" />
    <meta name="author" content="Southeast Cars & Commercials" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#eab308" />
    <meta name="msapplication-TileColor" content="#000000" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.southeastcars.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.southeastcars.com/" />
    <meta property="og:title" content="Southeast Cars & Commercials | Premium Used Cars for Sale" />
    <meta property="og:description" content="Browse our curated collection of premium used cars and commercial vehicles. Quality vehicles, certified inspections, and flexible financing." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1617788138017-80ad40651399?w=1200&h=630&fit=crop" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Southeast Cars & Commercials" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Southeast Cars & Commercials | Premium Used Cars for Sale" />
    <meta name="twitter:description" content="Browse our curated collection of premium used cars and commercial vehicles. Quality vehicles, certified inspections, and flexible financing." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1617788138017-80ad40651399?w=1200&h=630&fit=crop" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "AutoDealer",
      "name": "Southeast Cars & Commercials",
      "description": "Premium used car dealership offering curated quality vehicles with certified inspections and flexible financing.",
      "url": "https://www.southeastcars.com",
      "telephone": "+1-555-123-4567",
      "email": "sales@southeastcars.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Luxury Lane",
        "addressLocality": "Beverly Hills",
        "addressRegion": "CA",
        "postalCode": "90210",
        "addressCountry": "US"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "10:00",
          "closes": "16:00"
        }
      ],
      "sameAs": [],
      "priceRange": "$$$$"
    }
    </script>

    <!-- Structured Data - Website Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Southeast Cars & Commercials",
      "url": "https://www.southeastcars.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.southeastcars.com/inventory?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
